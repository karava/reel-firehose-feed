<!doctype html>
<meta charset="utf-8">
<title>Reel firehose</title>
<style>
  body { font: 15px system-ui; margin: 0; background: #0d0d0f; color: #eee; }
  h1 { padding: 16px 20px; margin: 0; font-size: 16px; font-weight: 600; }
  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px,1fr)); gap: 10px; padding: 0 16px 24px; }
  a.card { display: block; border-radius: 10px; overflow: hidden; background: #18181b; color: inherit; text-decoration: none; }
  a.card img { width: 100%; aspect-ratio: 9/16; object-fit: cover; display: block; }
  a.card .meta { padding: 8px 10px; font-size: 12px; line-height: 1.3; }
  a.card .u { color: #8ab4ff; }
</style>
<h1>Reel firehose</h1>
<div class="grid" id="grid"></div>
<script>
  fetch('reels.json').then(r => r.json()).then(items => {
    document.getElementById('grid').innerHTML = items.map(it => `
      <a class="card" href="${it.url}" target="_blank" rel="noopener">
        <img loading="lazy" src="${it.thumbnail || ''}" alt="">
        <div class="meta"><span class="u">@${it.username}</span><br>${(it.caption||'').slice(0,70)}</div>
      </a>`).join('');
  });
</script>
